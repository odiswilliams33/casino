:root {
  --c0: #7C3AED; --c0m: #A78BFA; --c0d: #4C1D95;
  --c1: #EA580C; --c1m: #FB923C; --c1d: #7C2D12;
  --c2: #059669; --c2m: #34D399; --c2d: #064E3B;
  --c3: #DB2777; --c3m: #F472B6; --c3d: #831843;
  --bg: #0F0A1E;
  --surface: #1A1035;
  --surface2: #241848;
  --surface3: #2e1f58;
  --text: #F5F0FF;
  --text2: #A899CC;
  --text3: #6B5F8A;
  --gold: #F59E0B;
  --gold2: #FEF3C7;
  --red: #EF4444;
  --spade: #60A5FA;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: radial-gradient(circle, rgba(124,58,237,0.1) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
  z-index: 0;
}

/* ── APP SHELL ── */
.app { position: relative; z-index: 1; display: flex; flex-direction: column; height: 100dvh; padding: 10px 12px 8px; gap: 8px; overflow: hidden; }

/* ── HEADER ── */
.header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.logo { display: flex; align-items: center; gap: 9px; }
.logo-suits { display: flex; gap: 2px; font-size: 16px; line-height: 1; }
.logo h1 { font-family: 'Archivo Black', sans-serif; font-size: 20px; letter-spacing: -0.5px; color: var(--text); }
.logo h1 span { color: var(--c0m); }
.header-right { display: flex; align-items: center; gap: 8px; }

/* ── TOP CONTROLS ── */
.controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap; }
.ctrl-group { display: flex; align-items: center; gap: 6px; background: var(--surface); border-radius: 12px; padding: 5px 10px; border: 1px solid rgba(255,255,255,0.06); }
.ctrl-label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.seg-btns { display: flex; gap: 4px; }
.seg-btn { width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid transparent; background: transparent; color: var(--text2); font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.seg-btn.active { background: var(--c0); border-color: var(--c0m); color: white; }
.seg-btn:hover:not(.active) { background: var(--surface2); color: var(--text); }
.reset-btn { padding: 8px 14px; border-radius: 10px; border: 1.5px solid rgba(234,88,12,0.5); background: transparent; color: var(--c1m); font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.reset-btn:hover { background: rgba(234,88,12,0.15); }

/* ── PLAYER GRID ── */
.grid { display: grid; gap: 10px; flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: 8px; }
.grid.p2 { grid-template-columns: 1fr 1fr; align-items: start; }
.grid.p3 { grid-template-columns: 1fr 1fr; align-items: start; }
.grid.p4 { grid-template-columns: 1fr 1fr; align-items: start; }

/* ── PLAYER CARD ── */
.card {
  background: var(--surface);
  border-radius: 18px;
  border: 1.5px solid rgba(255,255,255,0.07);
  display: flex; flex-direction: column; align-items: center;
  padding: 10px 10px 8px;
  gap: 5px;
  position: relative;
  overflow: clip;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.card.leader { border-color: var(--gold); box-shadow: 0 0 20px rgba(245,158,11,0.15); }
.card-bar { position: absolute; top: 0; left: 0; right: 0; height: 4px; border-radius: 18px 18px 0 0; }
.bar-0 { background: var(--c0m); }
.bar-1 { background: var(--c1m); }
.bar-2 { background: var(--c2m); }
.bar-3 { background: var(--c3m); }

.leader-badge { position: absolute; top: 10px; right: 8px; background: rgba(245,158,11,0.15); color: var(--gold); font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 8px; border: 1px solid rgba(245,158,11,0.3); }

.player-name { font-size: 13px; font-weight: 600; color: var(--text2); background: transparent; border: none; text-align: center; width: 100%; outline: none; cursor: text; padding: 2px 4px; border-radius: 6px; font-family: 'DM Sans', sans-serif; }
.player-name:focus { color: var(--text); background: var(--surface2); }

.score-num { font-family: 'Archivo Black', sans-serif; font-size: clamp(64px, 10vw, 110px); color: var(--text); line-height: 1; letter-spacing: -4px; }

/* progress bar */
.prog-track { width: 100%; height: 5px; background: rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 3px; transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1); }
.pf-0 { background: var(--c0m); }
.pf-1 { background: var(--c1m); }
.pf-2 { background: var(--c2m); }
.pf-3 { background: var(--c3m); }
.prog-label { font-size: 10px; color: var(--text3); font-weight: 600; }

/* ── ROUND SCORING PANEL ── */
.round-panel {
  width: 100%;
  background: var(--surface2);
  border-radius: 12px;
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.round-title { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }

.capture-row { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.cap-label { font-size: 11px; color: var(--text2); font-weight: 500; flex: 1; }
.cap-pts { font-size: 10px; color: var(--text3); font-weight: 600; min-width: 24px; text-align: right; }
.cap-check {
  width: 26px; height: 26px;
  border-radius: 7px;
  border: 1.5px solid rgba(255,255,255,0.15);
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
  transition: all 0.12s;
  flex-shrink: 0;
}
.cap-check.checked { border-color: transparent; }
.cap-check:active { transform: scale(0.88); }

.c0-checked { background: rgba(124,58,237,0.35); border-color: var(--c0m); }
.c1-checked { background: rgba(234,88,12,0.35); border-color: var(--c1m); }
.c2-checked { background: rgba(5,150,105,0.35); border-color: var(--c2m); }
.c3-checked { background: rgba(219,39,119,0.35); border-color: var(--c3m); }

.aces-row { display: flex; align-items: center; gap: 5px; }
.aces-label { font-size: 11px; color: var(--text2); font-weight: 500; flex: 1; }
.ace-btns { display: flex; gap: 3px; }
.ace-btn {
  width: 24px; height: 24px;
  border-radius: 6px;
  border: 1.5px solid rgba(255,255,255,0.12);
  background: transparent;
  color: var(--text3);
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.12s;
  font-family: 'Archivo Black', sans-serif;
}
.ace-btn.on { color: var(--gold); border-color: var(--gold); background: rgba(245,158,11,0.15); }
.ace-btn:active { transform: scale(0.88); }

.apply-btn {
  width: 100%;
  padding: 7px;
  border-radius: 9px;
  border: none;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
  font-family: 'Archivo Black', sans-serif;
  letter-spacing: 0.3px;
  margin-top: 2px;
}
.apply-btn:active { transform: scale(0.96); }
.ab-0 { background: var(--c0); color: white; }
.ab-0:hover { background: var(--c0m); }
.ab-1 { background: var(--c1); color: white; }

const PFCOLS  = ['pf-0','pf-1','pf-2','pf-3'];
const WINCOLS = ['wc0','wc1','wc2','wc3'];
const ABCOLS  = ['ab-0','ab-1','ab-2','ab-3'];
const CKCOLS  = ['c0-checked','c1-checked','c2-checked','c3-checked'];
const DEFAULT_NAMES = ['Player 1','Player 2','Player 3','Player 4'];

// Capture items: id, label, pts, suit symbol
const CAPTURES = [
  { id:'mostCards', label:'Most Cards',     pts:3, sym:'&#9827;' },
  { id:'mostSpades',label:'Most Spades',    pts:1, sym:'&#9824;' },
  { id:'bigCasino', label:'Big Casino (10&#9830;)', pts:2, sym:'&#9830;' },
  { id:'litCasino', label:'Little Casino (2&#9824;)', pts:1, sym:'&#9824;' },
];

let numPlayers = 2;
let scores   = [0,0,0,0];
let history  = [[],[],[],[]];
let names    = [...DEFAULT_NAMES];
let gameOver = false;
let confettiAnim = null;
let inputMode = 'slider'; // 'checkboxes' | 'slider'
let sliderVals = [0,0,0,0];
let gameWins = [0,0,0,0];
const BEST_OF = 3;
const WINS_NEEDED = Math.ceil(BEST_OF / 2);

// Per-player round state
let roundState = [
  { mostCards:false, mostSpades:false, bigCasino:false, litCasino:false, aces:0 },
  { mostCards:false, mostSpades:false, bigCasino:false, litCasino:false, aces:0 },
  { mostCards:false, mostSpades:false, bigCasino:false, litCasino:false, aces:0 },
  { mostCards:false, mostSpades:false, bigCasino:false, litCasino:false, aces:0 },
];

function calcRoundPts(i) {
  const s = roundState[i];
  return (s.mostCards?3:0) + (s.mostSpades?1:0) + (s.bigCasino?2:0) + (s.litCasino?1:0) + s.aces;
}

function toggleCapture(playerIdx, capId) {
  roundState[playerIdx][capId] = !roundState[playerIdx][capId];
  renderCard(playerIdx);
}

function setAces(playerIdx, count) {
  roundState[playerIdx].aces = roundState[playerIdx].aces === count ? 0 : count;
  renderCard(playerIdx);
}

function applyRound(playerIdx) {
  const pts = calcRoundPts(playerIdx);
  if (pts === 0) return;
  scores[playerIdx] += pts;
  history[playerIdx].push(pts);
  showPopup(playerIdx, pts);
  // reset round state for this player
  roundState[playerIdx] = { mostCards:false, mostSpades:false, bigCasino:false, litCasino:false, aces:0 };
  if (scores[playerIdx] >= WIN_TARGET) {
    renderCard(playerIdx);
    setTimeout(() => triggerWin(playerIdx), 300);
  } else {
    renderCard(playerIdx);
  }
}

function setPlayers(n) {
  numPlayers = n;
  document.getElementById('grid').className = 'grid p' + n;
  render();
}

function getLeader() {
  let max = Math.max(...scores.slice(0, numPlayers));
  if (max === 0) return -1;
  return scores.indexOf(max);
}

function render() {
  const grid = document.getElementById('grid');
  // Always rebuild skeleton so IDs exist before renderCard runs
  grid.innerHTML = '';
  for (let j = 0; j < numPlayers; j++) {
    const div = document.createElement('div');
    div.className = 'card ' + COLORS[j];
    div.id = 'card-' + j;
    grid.appendChild(div);
  }
  for (let i = 0; i < numPlayers; i++) renderCard(i);
}

function renderCard(i) {
  const grid = document.getElementById('grid');
  const leader = getLeader();
  const isLeader = leader === i && scores[i] > 0;
  const pct = Math.min(100, Math.round((scores[i] / WIN_TARGET) * 100));
  const s = roundState[i];
  const previewPts = calcRoundPts(i);
  if (!sliderVals) sliderVals = [0,0,0,0];
  const hist = history[i].slice(-4).reverse();
  const scoreSize = scores[i] >= 100 ? 'font-size:clamp(56px,8vw,90px)' : '';

  // Build capture checkboxes
  const capRows = CAPTURES.map(c => {
    const checked = s[c.id];
    const chkClass = checked ? 'cap-check checked ' + CKCOLS[i] : 'cap-check';
    const tick = checked ? '&#10003;' : '';
    return `<div class="capture-row">
      <span class="cap-label">${c.label}</span>
      <span class="cap-pts">+${c.pts}</span>
      <button class="${chkClass}" onclick="toggleCapture(${i},'${c.id}')">${tick}</button>
    </div>`;
  }).join('');

  // Ace buttons 1-4
  const aceBtns = [1,2,3,4].map(n => {
    const on = s.aces >= n;
    return `<button class="ace-btn ${on?'on':''}" onclick="setAces(${i},${n})">A</button>`;
  }).join('');

  const histHtml = history[i].map((h, hi) =>
    '<span class="hist-chip" onclick="openEditModal(' + i + ',' + hi + ')">+' + h + '</span>'
  ).reverse().join('');

  const cardHtml = `
    <div class="card-bar ${BARCOLS[i]}"></div>
    <div class="card-header-row">
      <input class="player-name" value="${names[i]}" maxlength="12" onchange="names[${i}]=this.value" style="flex:1;text-align:center;" />
      ${gameWins[i] > 0 ? '<div class="game-stars">' + '&#11088;'.repeat(gameWins[i]) + '</div>' : ''}
    </div>
    <div class="score-num" style="${scoreSize}">${scores[i]}</div>
    <div class="prog-track"><div class="prog-fill ${PFCOLS[i]}" style="width:${pct}%"></div></div>
    <div style="width:100%;padding:0 2px;">
      ${history[i].length > 0 ? '<div class="hist-label" style="text-align:center;margin-bottom:3px;">tap to edit</div>' : ''}
      <div class="hist-row">${histHtml}</div>
    </div>
        <div class="mode-toggle-bar" style="display:flex;width:100%;background:var(--surface3);border-radius:10px;padding:3px;gap:3px;flex-shrink:0;">
      <button style="flex:1;padding:6px 4px;border-radius:7px;border:none;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;background:${inputMode==='checkboxes'?'var(--surface)':'transparent'};color:${inputMode==='checkboxes'?'var(--text)':'var(--text3)'}" onclick="setInputMode('checkboxes')">&#9745; Checkboxes</button>
      <button style="flex:1;padding:6px 4px;border-radius:7px;border:none;font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;background:${inputMode==='slider'?'var(--surface)':'transparent'};color:${inputMode==='slider'?'var(--text)':'var(--text3)'}" onclick="setInputMode('slider')">&#8646; Slider</button>
    </div>
    <div style="${inputMode==='checkboxes'?'':'display:none'};width:100%">
      <div class="round-panel" style="margin:0">
        <div class="round-title">This Round</div>
        ${capRows}
        <div class="capture-row">
          <div class="aces-row" style="width:100%">
            <span class="aces-label">Aces &nbsp;<span style="font-size:9px;color:var(--text3)">(+1 each)</span></span>
            <div class="ace-btns">${aceBtns}</div>
          </div>
        </div>
        <div class="round-pts-preview">${previewPts > 0 ? '+' + previewPts + ' pts ready' : ''}</div>
        <button class="apply-btn ${ABCOLS[i]}" onclick="applyRound(${i})" ${previewPts===0?'disabled style="opacity:0.4;cursor:default"':''}>Add ${previewPts > 0 ? '+'+previewPts : ''} to Score</button>
      </div>
    </div>
    <div style="${inputMode==='slider'?'':'display:none'};width:100%">
      <div class="slider-panel sl-${i}">
        <div class="slider-val-display" id="slval-${i}" style="color:${['var(--c0m)','var(--c1m)','var(--c2m)','var(--c3m)'][i]}">${sliderVals[i]}</div>
        <div class="slider-wrap">
          <input class="pts-slider" type="range" min="0" max="11" step="1" value="${sliderVals[i]}"
            id="slider-${i}" oninput="updateSlider(${i},this.value)" />
        </div>
        <button class="slider-add-btn sla-${i}" onclick="applySlider(${i})" ${sliderVals[i]===0?'disabled style="opacity:0.4;cursor:default"':''}>
          Add +${sliderVals[i]} to Score
        </button>
      </div>
    </div>
  `;

  let cardEl = document.getElementById('card-' + i);
  if (!cardEl) return;
  cardEl.className = `card ${COLORS[i]}${isLeader?' leader':''}`;
  cardEl.innerHTML = cardHtml;
}

function openResetModal() {
  document.getElementById('resetModalBg').classList.add('show');
}

function closeResetModal() {
  document.getElementById('resetModalBg').classList.remove('show');
}

function confirmReset(type) {
  closeResetModal();
  if (type === 'all') {
    names = [...DEFAULT_NAMES];
    // Show setup screen again
    resetScores();
    showSetup();
  } else {
    resetScores();
  }
}

function showSetup() {
  const overlay = document.getElementById('setupOverlay');
  overlay.classList.remove('hide');
  // Pre-fill names
  for (let i = 0; i < 4; i++) {
    const inp = document.getElementById('sname' + i);
    if (inp) inp.value = names[i] === DEFAULT_NAMES[i] ? '' : names[i];
  }
  setupSelectPlayers(numPlayers);
}

function setupSelectPlayers(n) {
  document.querySelectorAll('.setup-player-btn').forEach((b,i) => {
    b.classList.toggle('active', i+2 === n);
  });
  // Show/hide name inputs
  for (let i = 0; i < 4; i++) {
    const inp = document.getElementById('sname' + i);
    if (inp) inp.classList.toggle('hidden', i >= n);
  }
  numPlayers = n;
}

function startGame() {
  // Grab names from setup inputs
  for (let i = 0; i < 4; i++) {
    const inp = document.getElementById('sname' + i);
    if (inp) {
      const val = inp.value.trim();
      names[i] = val || DEFAULT_NAMES[i];
    }
  }
  document.getElementById('setupOverlay').classList.add('hide');
  document.getElementById('grid').className = 'grid p' + numPlayers;
  render();
}

function resetScores() {
  scores = [0,0,0,0];
  history = [[],[],[],[]];
  roundState = [
    { mostCards:false, mostSpades:false, bigCasino:false, litCasino:false, aces:0 },
    { mostCards:false, mostSpades:false, bigCasino:false, litCasino:false, aces:0 },
    { mostCards:false, mostSpades:false, bigCasino:false, litCasino:false, aces:0 },
    { mostCards:false, mostSpades:false, bigCasino:false, litCasino:false, aces:0 },
  ];
  gameOver = false;
  sliderVals = [0,0,0,0];
  gameWins = [0,0,0,0];
  warnedPlayers.clear();
  closeWin();
  render();
}

function newGame() { resetScores(); }

function nextGame() {
  // Reset scores only - keep game win stars
  scores = [0,0,0,0];
  history = [[],[],[],[]];
  roundState = [
    { mostCards:false, mostSpades:false, bigCasino:false, litCasino:false, aces:0 },
    { mostCards:false, mostSpades:false, bigCasino:false, litCasino:false, aces:0 },
    { mostCards:false, mostSpades:false, bigCasino:false, litCasino:false, aces:0 },
    { mostCards:false, mostSpades:false, bigCasino:false, litCasino:false, aces:0 },
  ];
  sliderVals = [0,0,0,0];
  gameOver = false;
  warnedPlayers.clear();
  closeWin();
  render();
}


// ── INPUT MODE TOGGLE ─────────────────────────────────────────
function setInputMode(mode) {
  inputMode = mode;
  render();
}

// ── SLIDER ENTRY ──────────────────────────────────────────────
function updateSlider(playerIdx, val) {
  sliderVals[playerIdx] = parseInt(val);
  const display = document.getElementById('slval-' + playerIdx);
  const btn = document.querySelector('#card-' + playerIdx + ' .slider-add-btn');
  if (display) display.textContent = sliderVals[playerIdx];
  if (btn) {
    if (sliderVals[playerIdx] === 0) {
      btn.disabled = true; btn.style.opacity = '0.4'; btn.textContent = 'Add to Score';
    } else {
      btn.disabled = false; btn.style.opacity = '1';
      btn.textContent = 'Add +' + sliderVals[playerIdx] + ' to Score';
    }
  }
}

function applySlider(playerIdx) {
  const val = sliderVals[playerIdx];
  if (!val || val <= 0) return;
  scores[playerIdx] += val;
  history[playerIdx].push(val);
  showPopup(playerIdx, val);
  soundCheck(val);
  sliderVals[playerIdx] = 0;
  if (scores[playerIdx] >= WIN_TARGET) {
    renderCard(playerIdx);
    setTimeout(() => triggerWin(playerIdx), 300);
  } else {
    renderCard(playerIdx);
  }
}
// ── MANUAL SCORE ENTRY ────────────────────────────────────────
function applyManual(playerIdx) {
  const input = document.getElementById('manual-' + playerIdx);
  const val = parseInt(input.value);
  if (isNaN(val) || val <= 0) { input.value = ''; return; }
  scores[playerIdx] += val;
  history[playerIdx].push(val);
  showPopup(playerIdx, val);
  input.value = '';
  soundCheck(val);
  if (scores[playerIdx] >= WIN_TARGET) {
    renderCard(playerIdx);
    setTimeout(() => triggerWin(playerIdx), 300);
  } else {
    renderCard(playerIdx);
  }
}

// ── EDIT HISTORY MODAL ────────────────────────────────────────
let editState = { playerIdx: -1, histIdx: -1 };

function openEditModal(playerIdx, histIdx) {
  editState = { playerIdx, histIdx };
  const val = history[playerIdx][histIdx];
  document.getElementById('editModalTitle').textContent =
    'Edit ' + names[playerIdx] + '\u2019s score entry';
  document.getElementById('editModalVal').value = val;
  document.getElementById('editModalBg').classList.add('show');
  setTimeout(() => document.getElementById('editModalVal').select(), 100);
}

function closeEditModal() {
  document.getElementById('editModalBg').classList.remove('show');
  editState = { playerIdx: -1, histIdx: -1 };
}

function saveEdit() {
  const { playerIdx, histIdx } = editState;
  if (playerIdx < 0) return;
  const newVal = parseInt(document.getElementById('editModalVal').value);
  if (isNaN(newVal) || newVal < 0) return;
  const oldVal = history[playerIdx][histIdx];
  history[playerIdx][histIdx] = newVal;
  scores[playerIdx] = history[playerIdx].reduce((a,b) => a+b, 0);
  closeEditModal();
  soundCheck(newVal);
  renderCard(playerIdx);
}

function deleteEdit() {
  const { playerIdx, histIdx } = editState;
  if (playerIdx < 0) return;
  history[playerIdx].splice(histIdx, 1);
  scores[playerIdx] = history[playerIdx].reduce((a,b) => a+b, 0);
  closeEditModal();
  renderCard(playerIdx);
}

function showPopup(idx, pts) {
  const cardEl = document.getElementById('card-' + idx);
  if (!cardEl) return;
  const rect = cardEl.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'score-popup';
  el.textContent = '+' + pts;
  el.style.left = (rect.left + rect.width/2 - 20) + 'px';
  el.style.top  = (rect.top  + rect.height/2) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 900);
}

function triggerWin(idx) {
  gameOver = true;
  gameWins[idx]++;
  render(); // update stars on cards
  const overlay = document.getElementById('winOverlay');
  document.getElementById('winName').textContent = names[idx];
  document.getElementById('winName').className = 'win-name ' + WINCOLS[idx];
  document.getElementById('winScore').innerHTML = 'Reached <strong>' + scores[idx] + '</strong> points!';
  const btn = document.getElementById('winActionBtn');
  if (gameWins[idx] >= WINS_NEEDED) {
    btn.textContent = 'New Game';
    btn.onclick = function() { fullReset(); };
  } else {
    btn.textContent = 'Next Game';
    btn.onclick = function() { nextGame(); };
  }
  overlay.classList.add('show');
  startConfetti();
  soundWin();
}

function triggerMatchWin(idx) {
  document.getElementById('winOverlay').classList.remove('show');
  stopConfetti();
  const overlay = document.getElementById('matchOverlay');
  document.getElementById('matchName').textContent = names[idx];
  document.getElementById('matchName').className = 'match-name ' + WINCOLS[idx];
  document.getElementById('matchSub').innerHTML = `Won <strong>${gameWins[idx]}</strong> of ${BEST_OF} games!`;
  overlay.classList.add('show');
  startMatchConfetti();
  soundWin();
}

function closeMatchWin() {
  document.getElementById('matchOverlay').classList.remove('show');
  stopMatchConfetti();
}

function fullReset() {
  gameWins = [0,0,0,0];
  closeMatchWin();
  resetScores();
}

function closeWin() {
  document.getElementById('winOverlay').classList.remove('show');
  stopConfetti();
  gameOver = false;
}

// ── CONFETTI ──────────────────────────────────────────────────
const CCOLS = ['#A78BFA','#FB923C','#34D399','#F472B6','#F59E0B','#60A5FA','#fff'];
let confettiPieces = [];

function startConfetti() {
  const c = document.getElementById('confettiCanvas');
  c.width = window.innerWidth; c.height = window.innerHeight;
  confettiPieces = [];
  for (let i=0;i<160;i++) confettiPieces.push({
    x:Math.random()*c.width, y:Math.random()*c.height-c.height,
    w:Math.random()*10+6, h:Math.random()*5+3,
    color:CCOLS[Math.floor(Math.random()*CCOLS.length)],
    rot:Math.random()*360, vx:(Math.random()-0.5)*3, vy:Math.random()*4+2,
    vr:(Math.random()-0.5)*6
  });
  animateConfetti();
}

function animateConfetti() {
  const c = document.getElementById('confettiCanvas');
  if (!c) return;
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  confettiPieces.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
    if (p.y>c.height) { p.y=-20; p.x=Math.random()*c.width; }
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
    ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
  });
  if (document.getElementById('winOverlay').classList.contains('show'))
    confettiAnim = requestAnimationFrame(animateConfetti);
}

function stopConfetti() {
  if (confettiAnim) { cancelAnimationFrame(confettiAnim); confettiAnim = null; }
  const c = document.getElementById('confettiCanvas');
  if (c) c.getContext('2d').clearRect(0,0,c.width,c.height);
}

// ── MATCH CONFETTI (separate canvas) ────────────────────────
let matchConfettiAnim = null;
let matchConfettiPieces = [];

function startMatchConfetti() {
  const c = document.getElementById('matchConfettiCanvas');
  c.width = window.innerWidth; c.height = window.innerHeight;
  matchConfettiPieces = [];
  for (let i=0;i<200;i++) matchConfettiPieces.push({
    x:Math.random()*c.width, y:Math.random()*c.height-c.height,
    w:Math.random()*12+6, h:Math.random()*6+3,
    color:CCOLS[Math.floor(Math.random()*CCOLS.length)],
    rot:Math.random()*360, vx:(Math.random()-0.5)*4, vy:Math.random()*5+2,
    vr:(Math.random()-0.5)*8
  });
  animateMatchConfetti();
}

function animateMatchConfetti() {
  const c = document.getElementById('matchConfettiCanvas');
  if (!c) return;
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  matchConfettiPieces.forEach(p => {
    p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr;
    if (p.y>c.height) { p.y=-20; p.x=Math.random()*c.width; }
    ctx.save(); ctx.translate(p.x,p.y); ctx.rotate(p.rot*Math.PI/180);
    ctx.fillStyle=p.color; ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h); ctx.restore();
  });
  if (document.getElementById('matchOverlay').classList.contains('show'))
    matchConfettiAnim = requestAnimationFrame(animateMatchConfetti);
}

function stopMatchConfetti() {
  if (matchConfettiAnim) { cancelAnimationFrame(matchConfettiAnim); matchConfettiAnim = null; }
  const c = document.getElementById('matchConfettiCanvas');
  if (c) c.getContext('2d').clearRect(0,0,c.width,c.height);
}

window.addEventListener('resize', () => {
  const c = document.getElementById('confettiCanvas');
  if (c) { c.width=window.innerWidth; c.height=window.innerHeight; }
  const mc = document.getElementById('matchConfettiCanvas');
  if (mc) { mc.width=window.innerWidth; mc.height=window.innerHeight; }
});

// ── AUDIO ─────────────────────────────────────────────────────
let audioCtx = null;
const warnedPlayers = new Set();

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (audioCtx.state==='suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, type, vol, attack, decay, start) {
  const ctx = getCtx();
  const osc = ctx.createOscillator();
  const gain = ctx.createGain();
  osc.connect(gain); gain.connect(ctx.destination);
  osc.type = type;
  osc.frequency.setValueAtTime(freq, ctx.currentTime+start);
  gain.gain.setValueAtTime(0, ctx.currentTime+start);
  gain.gain.linearRampToValueAtTime(vol, ctx.currentTime+start+attack);
  gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+start+attack+decay);
  osc.start(ctx.currentTime+start);
  osc.stop(ctx.currentTime+start+attack+decay+0.05);
}

function soundCheck(pts) {
  const freq = 220 + pts * 14;
  playTone(freq,     'sine',     0.16, 0.005, 0.14, 0);
  playTone(freq*2,   'sine',     0.07, 0.003, 0.08, 0);
  playTone(freq*0.5, 'triangle', 0.10, 0.002, 0.09, 0.01);
}

function soundWarning() {
  playTone(880,'sine',0.13,0.003,0.08,0);
  playTone(880,'sine',0.09,0.003,0.06,0.13);
  playTone(1108,'sine',0.11,0.003,0.10,0.26);
}

function soundWin() {
  const notes=[[523,0],[659,0.10],[784,0.20],[1047,0.30],[784,0.42],[1047,0.50],[1319,0.60],[1047,0.75],[1319,0.85],[1568,0.95]];
  notes.forEach(([f,t])=>playTone(f,'sine',0.17,0.01,0.22,t));
  [0,0.10,0.30,0.60,0.95].forEach(t=>playTone(130,'triangle',0.18,0.005,0.15,t));
}

// Patch applyRound to play sounds
const _applyRound = applyRound;
window.applyRound = function(playerIdx) {
  const pts = calcRoundPts(playerIdx);
  if (pts === 0) return;
  soundCheck(pts);
  const newScore = scores[playerIdx] + pts;
  if (newScore / WIN_TARGET >= 0.8 && !warnedPlayers.has(playerIdx)) {
    warnedPlayers.add(playerIdx);
    setTimeout(soundWarning, 200);
  }
  _applyRound(playerIdx);
};

// ── INIT ──────────────────────────────────────────────────────
// Show setup screen on load
showSetup();
</script>
